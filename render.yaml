# Render Blueprint for the Express backend.
# This file lives at the repository root because the backend also lives at the root.
#
# Create the service in Render with:
# 1. New + > Blueprint
# 2. Select this repository
# 3. Render reads this file and creates the backend web service
#
# Notes:
# - Secrets marked with `sync: false` are entered in the Render dashboard during setup.
# - Random secrets marked with `generateValue: true` are generated by Render automatically.
# - `FRONTEND_URL` should be your Vercel frontend URL, for example:
#   https://your-frontend.vercel.app
# - If you use a custom domain later, replace `FRONTEND_URL` with that domain.

services:
  - type: web
    name: wholesale-ecommerce-backend
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/test

    envVars:
      # Render sets PORT automatically, so the app just reads process.env.PORT.
      - key: NODE_ENV
        value: production

      # Backend JWT expiry used across auth and session flows.
      - key: JWT_EXPIRES_IN
        value: 7d

      # MongoDB Atlas connection string.
      - key: MONGO_URI
        sync: false

      # Frontend URL used by backend CORS.
      # Supports a single origin or a comma-separated list of origins.
      - key: FRONTEND_URL
        sync: false

      # Long-lived auth secret for JWT signing.
      - key: JWT_SECRET
        generateValue: true

      # Separate secret for hashing OTP flows.
      - key: OTP_SECRET
        generateValue: true
